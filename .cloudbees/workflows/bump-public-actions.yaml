  apiVersion: automation.cloudbees.io/v1alpha1                                                                                                                                                                                                      
  kind: workflow                                                                                                                                                                                                                                    
  name: Bump Public Action Images                                                                                                                                                                                                                   
                                                                                                                                                                                                                                                    
  on:                                                                                                                                                                                                                                               
    push:                                                                                                                                                                                                                                           
      branches:                                                                                                                                                                                                                                     
        - master
                                                                                                                                                                                                                                                    
  permissions:    
    scm-token-own: read                                                                                                                                                                                                                             
                                                                                                                                                                                                                                                    
  jobs:                                                                                                                                                                                                                                             
    bump-actions:                                                                                                                                                                                                                                   
      if: ${{ cloudbees.scm.branch == 'master' }}                                                                                                                                                                                                   
      steps:                                                                                                                                                                                                                                        
        - name: Checkout                                                                                                                                                                                                                            
          uses: cloudbees-io/checkout@v2                                                                                                                                                                                                            
          with:                                                                                                                                                                                                                                     
            fetch-depth: 2                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                    
        - name: Check if action_artifacts.json changed                                                                                                                                                                                              
          id: check-changes                                                                                                                                                                                                                         
          uses: docker://alpine/git:latest                                                                                                                                                                                                          
          run: |                                                                                                                                                                                                                                    
            echo -n "true" > $CLOUDBEES_OUTPUTS/result                                                                                                                                                                                           
                                                                                                                                                                                                                         
                                                                                                                                                                                                                                                    
            # Debug output                                                                                                                                                                                                                          
            echo ""
            echo "=== Debug: Result ==="                                                                                                                                                                                                            
            printf "Content: '%s'\n" "$(cat $CLOUDBEES_OUTPUTS/result)"                                                                                                                                                                             
            echo "Length: $(cat $CLOUDBEES_OUTPUTS/result | wc -c)"                                                                                                                                                                                 
            echo "=== End Debug ==="                                                                                                                                                                                                                
                                                                                                                                                                                                                                                    
        - name: Bump all changed actions                                                                                                                                                                                                            
          if: ${{ steps.check-changes.outputs.result == 'true' }}                                                                                                                                                                                   
          uses: docker://alpine:latest
          run: |
            echo 'inside'
