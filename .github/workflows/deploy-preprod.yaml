name: register-artifact-from-github                                                                                                                                                                                                               
on:                                                                                                                                                                                                                                               
    push                                                                                                                                                                                                                                            
jobs:                                                                                                                                                                                                                                             
    register-artifact:                                                                                                                                                                                                                              
      runs-on: ubuntu-latest
      permissions:                                                                                                                                                                                                                                  
        id-token: write                                                                                                                                                                                                                             
        contents: read                                                                                                                                                                                                                              
      steps:                                                                                                                                                                                                                                        
        - name: Checkout code                                                                                                                                                                                                                       
          uses: actions/checkout@v6                                                                                                                                                                                                                 
        - name: Build                                                                                                                                                                                                                               
          run: |                                                                                                                                                                                                                                    
            sleep 10                                                                                                                                                                                                                                
        - name: Register build artifact                                                                                                                                                                                                             
          id: register-build-artifact                                                                                                                                                                                                               
          uses: cloudbees-io-gha/register-build-artifact@v3                                                                                                                                                                                         
          with:                                                                                                                                                                                                                                     
            cloudbees-url: "https://api.saas-preprod.beescloud.com"                                                                                                                                                                                 
            name: h-artifact-gha-bb                                                                                                                                                                                                                 
            url: "https://example.com/h-artifact-gha/1.0.0"                                                                                                                                                                                         
            version: 1.0.0                                                                                                                                                                                                                          
        - name: Print artifact id                                                                                                                                                                                                                   
          run: |                                                                                                                                                                                                                                    
            echo '${{ steps.register-build-artifact.outputs.cbp_artifact_id }}'                                                                                                                                                                     
        - name: Checkout deployment metrics action                                                                                                                                                                                                  
          uses: actions/checkout@v4                                                                                                                                                                                                                 
          with:                                                                                                                                                                                                                                     
            repository: your-org/gha-register-deployed-artifact                                                                                                                                                                                     
            ref: your-branch-name                                                                                                                                                                                                                   
            token: ${{ secrets.GH_PAT }}
            path: ./.github/actions/register-deployed-artifact                                                                                                                                                                                      
        - name: Register deployed artifact
          uses: ./.github/actions/register-deployed-artifact
          id: register-deployed-artifact                                                                                                                                                                                                            
          with:                                                                                                                                                                                                                                     
            cloudbees-url: "https://api.saas-preprod.beescloud.com"                                                                                                                                                                                 
            artifact-id: ${{ steps.register-build-artifact.outputs.cbp_artifact_id }}                                                                                                                                                               
            target-environment: Production                                                                                                                                                                                                          
            labels: test                    
